{% load static %}
<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bakanov — Bitrix24</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet" type="text/css" />
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <script src="//api.bitrix24.com/api/v1/"></script>
  <style>[x-cloak]{display:none!important}</style>
</head>
<body class="min-h-screen bg-base-200 text-base-content p-4">

  <div x-data="bx24App()" x-init="init()" x-cloak>
    <!-- Header -->
    <div class="navbar bg-base-100 rounded-box shadow mb-4 min-h-12 px-4">
      <div class="flex-1">
        <span class="text-lg font-semibold">Bakanov CRM</span>
        <span class="badge badge-ghost ml-2" x-text="domain"></span>
      </div>
      <div class="flex-none">
        <span class="badge badge-success badge-sm" x-show="connected">Подключено</span>
      </div>
    </div>

    <!-- Back button when form open -->
    <div x-show="selectedDealId" class="mb-4">
      <button class="btn btn-ghost btn-sm gap-1" @click="selectedDealId=''; contractResult=null">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
        Назад к списку
      </button>
      <span class="text-sm ml-2" x-text="'Сделка #' + selectedDealId + ' — ' + contractForm.deal_title"></span>
    </div>

    <!-- Deals list (hidden when form open) -->
    <div x-show="!selectedDealId">
      <div class="card bg-base-100 shadow">
        <div class="card-body p-4">
          <div class="flex items-center justify-between mb-2">
            <h2 class="card-title text-sm">Сделки</h2>
            <button class="btn btn-ghost btn-xs" @click="loadDeals()">⟳</button>
          </div>
          <div x-show="loading" class="flex justify-center py-4">
            <span class="loading loading-spinner loading-md"></span>
          </div>
          <div x-show="!loading && deals.length === 0" class="text-sm opacity-50">Нет сделок</div>
          <div class="overflow-x-auto" x-show="!loading && deals.length > 0">
            <table class="table table-xs">
              <thead>
                <tr><th>ID</th><th>Название</th><th>Сумма</th><th>Статус</th><th></th></tr>
              </thead>
              <tbody>
                <template x-for="deal in deals" :key="deal.ID">
                  <tr>
                    <td x-text="deal.ID"></td>
                    <td x-text="deal.TITLE"></td>
                    <td x-text="deal.OPPORTUNITY ? deal.OPPORTUNITY + ' EUR' : ''"></td>
                    <td><span class="badge badge-sm badge-ghost" x-text="deal.STAGE_ID"></span></td>
                    <td>
                      <button class="btn btn-primary btn-xs" @click="openContractForm(deal.ID)">
                        Договор
                      </button>
                    </td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- Contract form -->
    <div x-show="selectedDealId">
      <div x-show="contractLoading" class="flex justify-center py-8">
        <span class="loading loading-spinner loading-lg"></span>
      </div>

      <div x-show="!contractLoading" class="space-y-3">
        <!-- Cruise data -->
        <div class="collapse collapse-arrow bg-base-100 shadow">
          <input type="checkbox" checked>
          <div class="collapse-title text-sm font-semibold">Данные круиза</div>
          <div class="collapse-content space-y-3">
            <div class="form-control">
              <label class="label"><span class="label-text text-xs">Марина</span></label>
              <select x-model="contractForm.marina" class="select select-bordered select-sm">
                <option value="">— Выберите —</option>
                <option value="Турция">Турция</option>
                <option value="Сейшелы">Сейшелы</option>
                <option value="Таиланд">Таиланд</option>
                <option value="Черногория">Черногория</option>
              </select>
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div class="form-control">
                <label class="label"><span class="label-text text-xs">Тип яхты</span></label>
                <input type="text" x-model="contractForm.boat_type" class="input input-bordered input-sm">
              </div>
              <div class="form-control">
                <label class="label"><span class="label-text text-xs">Кают</span></label>
                <input type="number" x-model="contractForm.cabins" class="input input-bordered input-sm">
              </div>
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div class="form-control">
                <label class="label"><span class="label-text text-xs">Гостей</span></label>
                <input type="number" x-model="contractForm.clients" class="input input-bordered input-sm">
              </div>
              <div class="form-control">
                <label class="label"><span class="label-text text-xs">Страна клиента</span></label>
                <input type="text" x-model="contractForm.client_country" class="input input-bordered input-sm">
              </div>
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div class="form-control">
                <label class="label"><span class="label-text text-xs">Дата начала</span></label>
                <input type="text" x-model="contractForm.trip_start" placeholder="дд.мм.гггг" class="input input-bordered input-sm">
              </div>
              <div class="form-control">
                <label class="label"><span class="label-text text-xs">Дата окончания</span></label>
                <input type="text" x-model="contractForm.trip_end" placeholder="дд.мм.гггг" class="input input-bordered input-sm">
              </div>
            </div>
            <div class="form-control">
              <label class="label"><span class="label-text text-xs">Вид договора</span></label>
              <select x-model="contractForm.cruise_type" class="select select-bordered select-sm">
                <option value="">— Выберите —</option>
                <option value="Индивидуальный">Индивидуальный</option>
                <option value="Групповой">Групповой</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Client data -->
        <div class="collapse collapse-arrow bg-base-100 shadow">
          <input type="checkbox" checked>
          <div class="collapse-title text-sm font-semibold">Данные клиента</div>
          <div class="collapse-content space-y-3">
            <div class="form-control">
              <label class="label"><span class="label-text text-xs">ФИО</span></label>
              <input type="text" x-model="contractForm.client_fullname" class="input input-bordered input-sm">
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div class="form-control">
                <label class="label"><span class="label-text text-xs">Email</span></label>
                <input type="email" x-model="contractForm.email" class="input input-bordered input-sm">
              </div>
              <div class="form-control">
                <label class="label"><span class="label-text text-xs">Телефон</span></label>
                <input type="tel" x-model="contractForm.phone" class="input input-bordered input-sm">
              </div>
            </div>
            <div class="form-control">
              <label class="label"><span class="label-text text-xs">Дата рождения</span></label>
              <input type="text" x-model="contractForm.client_bdate" placeholder="дд.мм.гггг" class="input input-bordered input-sm">
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div class="form-control">
                <label class="label"><span class="label-text text-xs">Паспорт серия/номер</span></label>
                <input type="text" x-model="contractForm.client_passport_number" class="input input-bordered input-sm">
              </div>
              <div class="form-control">
                <label class="label"><span class="label-text text-xs">Дата выдачи</span></label>
                <input type="text" x-model="contractForm.client_passport_date" placeholder="дд.мм.гггг" class="input input-bordered input-sm">
              </div>
            </div>
            <div class="form-control">
              <label class="label"><span class="label-text text-xs">Кем выдан</span></label>
              <input type="text" x-model="contractForm.client_passport_text" class="input input-bordered input-sm">
            </div>
            <div class="form-control">
              <label class="label"><span class="label-text text-xs">Место рождения</span></label>
              <input type="text" x-model="contractForm.client_passport_bplace" class="input input-bordered input-sm">
            </div>
          </div>
        </div>

        <!-- Finance -->
        <div class="collapse collapse-arrow bg-base-100 shadow">
          <input type="checkbox">
          <div class="collapse-title text-sm font-semibold">Финансы</div>
          <div class="collapse-content space-y-3">
            <div class="grid grid-cols-2 gap-3">
              <div class="form-control">
                <label class="label"><span class="label-text text-xs">Сумма (EUR)</span></label>
                <input type="number" x-model="contractForm.price_eur" class="input input-bordered input-sm">
              </div>
              <div class="form-control">
                <label class="label"><span class="label-text text-xs">Курс EUR/RUB</span></label>
                <input type="number" x-model="contractForm.eur_rate" step="0.01" class="input input-bordered input-sm">
              </div>
            </div>
            <div class="form-control">
              <label class="label"><span class="label-text text-xs">Налоги и сборы (EUR)</span></label>
              <input type="text" x-model="contractForm.tax_value" class="input input-bordered input-sm">
            </div>
            <div class="form-control">
              <label class="label"><span class="label-text text-xs">Доп. услуги (по одному на строку)</span></label>
              <textarea x-model="contractForm.extra_text" class="textarea textarea-bordered textarea-sm" rows="3" placeholder="- Трансфер&#10;- Экскурсия"></textarea>
            </div>
          </div>
        </div>

        <!-- Generate button -->
        <div class="card bg-base-100 shadow">
          <div class="card-body p-4">
            <button class="btn btn-primary w-full" :class="{'loading': generating}" :disabled="generating" @click="generateContract()">
              <span x-show="!generating">Сформировать договор</span>
              <span x-show="generating">Генерация…</span>
            </button>

            <div x-show="contractResult" class="mt-3">
              <div x-show="contractResult?.status==='ok'" class="alert alert-success">
                <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current shrink-0 h-5 w-5" fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                <span>Договор создан!</span>
              </div>
              <div x-show="contractResult?.status==='warning'" class="alert alert-warning">
                <span>Договор создан с предупреждениями</span>
              </div>
              <div x-show="contractResult?.status==='error'" class="alert alert-error">
                <span x-text="contractResult?.detail || 'Ошибка'"></span>
              </div>
              <div x-show="contractResult?.file_url" class="mt-2 text-center">
                <a :href="contractResult.file_url" target="_blank" class="btn btn-sm btn-outline gap-1">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                  Скачать PDF
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function bx24App() {
      return {
        domain: '{{ domain }}',
        memberId: '{{ member_id }}',
        connected: false,
        loading: true,
        deals: [],
        selectedDealId: '',
        contractLoading: false,
        generating: false,
        contractResult: null,

        contractForm: {
          deal_title: '', marina: '', boat_type: '', cabins: '', clients: '',
          client_country: '', trip_start: '', trip_end: '', cruise_type: '',
          client_fullname: '', email: '', phone: '', client_bdate: '',
          client_passport_number: '', client_passport_date: '',
          client_passport_text: '', client_passport_bplace: '',
          price_eur: '', eur_rate: '', tax_value: '', extra_text: '',
        },

        init() {
          BX24.init(() => {
            this.connected = true;
            BX24.resizeWindow(800, 900);
            this.loadDeals();
          });
        },

        loadDeals() {
          this.loading = true;
          BX24.callMethod('crm.deal.list', {
            order: { ID: 'DESC' },
            select: ['ID', 'TITLE', 'OPPORTUNITY', 'STAGE_ID'],
            start: 0,
          }, (r) => {
            this.deals = r.data() ? r.data().slice(0, 50) : [];
            this.loading = false;
          });
        },

        openContractForm(dealId) {
          this.selectedDealId = String(dealId);
          this.contractResult = null;
          this.contractLoading = true;
          this.resetForm();

          const deal = this.deals.find(d => String(d.ID) === String(dealId));
          if (deal) {
            this.contractForm.deal_title = deal.TITLE || '';
            this.contractForm.price_eur = deal.OPPORTUNITY || '';
          }

          const batch = { deal: ['crm.deal.get', { ID: dealId }] };

          BX24.callBatch(batch, (r) => {
            const dealData = r.deal.data();
            if (dealData) {
              this.contractForm.price_eur = dealData.OPPORTUNITY || '';
              if (dealData.CONTACT_ID) {
                BX24.callMethod('crm.contact.get', { ID: dealData.CONTACT_ID }, (res) => {
                  const c = res.data();
                  if (c) {
                    this.contractForm.client_fullname = [c.LAST_NAME, c.NAME, c.SECOND_NAME].filter(Boolean).join(' ');
                    if (c.EMAIL && c.EMAIL.length) this.contractForm.email = c.EMAIL[0].VALUE || '';
                    if (c.PHONE && c.PHONE.length) this.contractForm.phone = c.PHONE[0].VALUE || '';
                  }
                  this.contractLoading = false;
                });
              } else {
                this.contractLoading = false;
              }
            } else {
              this.contractLoading = false;
            }
          });
        },

        resetForm() {
          this.contractForm = {
            deal_title: this.contractForm.deal_title, marina: '', boat_type: '', cabins: '', clients: '',
            client_country: '', trip_start: '', trip_end: '', cruise_type: '',
            client_fullname: '', email: '', phone: '', client_bdate: '',
            client_passport_number: '', client_passport_date: '',
            client_passport_text: '', client_passport_bplace: '',
            price_eur: this.contractForm.price_eur, eur_rate: '', tax_value: '', extra_text: '',
          };
        },

        async generateContract() {
          this.generating = true;
          this.contractResult = null;
          try {
            const resp = await fetch('/bitrix24/contract/generate/', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                member_id: this.memberId,
                deal_id: parseInt(this.selectedDealId),
                overrides: {
                  ...this.contractForm,
                  extra_items: this.contractForm.extra_text ? this.contractForm.extra_text.split('\n').map(s => s.replace(/^-\s*/, '').trim()).filter(Boolean) : [],
                },
                email_to: this.contractForm.email || null,
              }),
            });
            this.contractResult = await resp.json();
          } catch (err) {
            this.contractResult = { status: 'error', detail: err.message };
          } finally {
            this.generating = false;
          }
        },
      };
    }
  </script>
</body>
</html>
