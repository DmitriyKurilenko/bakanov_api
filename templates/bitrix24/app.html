{% load static %}
<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bakanov — Bitrix24</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet" type="text/css" />
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <script src="//api.bitrix24.com/api/v1/"></script>
</head>
<body class="min-h-screen bg-base-200 text-base-content p-4">

  <div x-data="bx24App()" x-init="init()">
    <!-- Header -->
    <div class="navbar bg-base-100 rounded-box shadow mb-4 min-h-12 px-4">
      <div class="flex-1">
        <span class="text-lg font-semibold">Bakanov CRM</span>
        <span class="badge badge-ghost ml-2" x-text="domain"></span>
      </div>
      <div class="flex-none">
        <span class="badge badge-success badge-sm" x-show="connected">Подключено</span>
      </div>
    </div>

    <!-- Current user info -->
    <div class="card bg-base-100 shadow mb-4">
      <div class="card-body p-4">
        <h2 class="card-title text-sm">Текущий пользователь</h2>
        <template x-if="currentUser">
          <div class="flex items-center gap-3 mt-1">
            <div class="avatar placeholder">
              <div class="bg-neutral text-neutral-content w-10 rounded-full">
                <span x-text="(currentUser.NAME || '?')[0]"></span>
              </div>
            </div>
            <div>
              <p class="font-medium" x-text="currentUser.NAME + ' ' + currentUser.LAST_NAME"></p>
              <p class="text-xs opacity-60" x-text="currentUser.EMAIL"></p>
            </div>
          </div>
        </template>
        <div x-show="!currentUser" class="text-sm opacity-50">Загрузка…</div>
      </div>
    </div>

    <!-- Quick CRM stats -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
      <template x-for="stat in stats" :key="stat.label">
        <div class="card bg-base-100 shadow">
          <div class="card-body p-3 items-center text-center">
            <div class="text-2xl font-bold" x-text="stat.value"></div>
            <div class="text-xs opacity-60" x-text="stat.label"></div>
          </div>
        </div>
      </template>
    </div>

    <!-- Recent leads -->
    <div class="card bg-base-100 shadow">
      <div class="card-body p-4">
        <div class="flex items-center justify-between mb-2">
          <h2 class="card-title text-sm">Последние лиды</h2>
          <button class="btn btn-ghost btn-xs" @click="loadLeads()">⟳</button>
        </div>
        <div x-show="leads.length === 0" class="text-sm opacity-50">Нет данных</div>
        <div class="overflow-x-auto">
          <table class="table table-xs" x-show="leads.length > 0">
            <thead>
              <tr>
                <th>ID</th>
                <th>Название</th>
                <th>Статус</th>
                <th>Ответственный</th>
              </tr>
            </thead>
            <tbody>
              <template x-for="lead in leads" :key="lead.ID">
                <tr>
                  <td x-text="lead.ID"></td>
                  <td x-text="lead.TITLE"></td>
                  <td><span class="badge badge-sm badge-ghost" x-text="lead.STATUS_ID"></span></td>
                  <td x-text="lead.ASSIGNED_BY_ID"></td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    function bx24App() {
      return {
        domain: '{{ domain }}',
        memberId: '{{ member_id }}',
        connected: false,
        currentUser: null,
        stats: [],
        leads: [],

        init() {
          BX24.init(() => {
            this.connected = true;
            BX24.resizeWindow(800, 900);
            this.loadCurrentUser();
            this.loadStats();
            this.loadLeads();
          });
        },

        loadCurrentUser() {
          BX24.callMethod('user.current', {}, (result) => {
            if (result.data()) this.currentUser = result.data();
          });
        },

        loadStats() {
          const batch = {
            leads: ['crm.lead.list', { filter: {}, start: -1 }],
            deals: ['crm.deal.list', { filter: {}, start: -1 }],
            contacts: ['crm.contact.list', { filter: {}, start: -1 }],
            companies: ['crm.company.list', { filter: {}, start: -1 }],
          };
          BX24.callBatch(batch, (result) => {
            this.stats = [
              { label: 'Лиды', value: result.leads.answer.total || 0 },
              { label: 'Сделки', value: result.deals.answer.total || 0 },
              { label: 'Контакты', value: result.contacts.answer.total || 0 },
              { label: 'Компании', value: result.companies.answer.total || 0 },
            ];
          });
        },

        loadLeads() {
          BX24.callMethod('crm.lead.list', {
            order: { ID: 'DESC' },
            select: ['ID', 'TITLE', 'STATUS_ID', 'ASSIGNED_BY_ID'],
            start: 0,
          }, (result) => {
            if (result.data()) this.leads = result.data().slice(0, 10);
          });
        },
      };
    }
  </script>
</body>
</html>
