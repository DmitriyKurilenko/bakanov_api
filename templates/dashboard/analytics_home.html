{% extends 'base.html' %}
{% block title %}Аналитика{% endblock %}
{% block content %}
<div class="space-y-4">
  <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-2">
    <div>
      <h1 class="text-xl md:text-2xl font-bold">Аналитика</h1>
      <p class="opacity-70 text-sm">Раздел временно очищен. Отчеты доступны отдельно в разделе «Отчеты».</p>
    </div>
    <a href="{{ reports_url }}" class="btn btn-outline btn-sm">Открыть раздел Отчеты</a>
  </div>
  <div role="alert" class="alert">
    <span>Оперативная аналитика временно отключена. Используйте раздел «Отчеты».</span>
  </div>
</div>
{% endblock %}
