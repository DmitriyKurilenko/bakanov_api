services:
  web:
    build: .
    command: sh -c "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --timeout ${GUNICORN_TIMEOUT:-120} --graceful-timeout ${GUNICORN_GRACEFUL_TIMEOUT:-30} --workers ${GUNICORN_WORKERS:-2}"
    env_file:
      - .env
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  celery_worker:
    build: .
    command: celery -A config worker -l info
    env_file:
      - .env
    volumes:
      - ./:/app
    depends_on:
      - web
      - redis

  celery_beat:
    build: .
    command: celery -A config beat -l info
    env_file:
      - .env
    volumes:
      - ./:/app
    depends_on:
      - web
      - redis

  flower:
    build: .
    command: celery -A config flower --port=5555
    env_file:
      - .env
    volumes:
      - ./:/app
    ports:
      - "5555:5555"
    depends_on:
      - redis

volumes:
  postgres_data:
