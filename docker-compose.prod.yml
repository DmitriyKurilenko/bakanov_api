services:
  web:
    build: .
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --timeout ${GUNICORN_TIMEOUT:-120} --graceful-timeout ${GUNICORN_GRACEFUL_TIMEOUT:-30} --workers ${GUNICORN_WORKERS:-2}
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      - db
      - redis

  db:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  celery_worker:
    build: .
    command: celery -A config worker -l info
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media
    depends_on:
      - web
      - redis

  celery_beat:
    build: .
    command: celery -A config beat -l info
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media
    depends_on:
      - web
      - redis

  flower:
    build: .
    command: celery -A config flower --port=5555
    env_file:
      - .env
    restart: unless-stopped
    ports:
      - "127.0.0.1:5555:5555"
    depends_on:
      - redis

volumes:
  postgres_data:
  static_data:
  media_data:
